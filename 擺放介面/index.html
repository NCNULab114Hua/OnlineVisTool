<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choose a level and start a kid-friendly placement optimization mission.">
  <title>Mission Map Lab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-home">
  <main class="game-shell">
    <section class="game-home-hero">
      <div class="hero-bubble">
        <span class="hero-badge">Sensor Game</span>
        <h1>MEOWTOPIA</h1>
      </div>
    </section>

    <section class="level-select-panel">
      <div class="section-heading playful-heading">
        <h2>Pick A Level</h2>
      </div>

      <div class="level-grid">
        <a class="level-card level-card-1" href="level-1.html">
          <span class="level-number">1</span>
          <span class="level-map-size">5 x 5 Map</span>
        </a>

        <a class="level-card level-card-2" href="level-2.html">
          <span class="level-number">2</span>
          <span class="level-map-size">10 x 10 Map</span>
        </a>

        <a class="level-card level-card-3" href="level-3.html">
          <span class="level-number">3</span>
          <span class="level-map-size">15 x 15 Map</span>
        </a>

        <a class="level-card level-card-4" href="level-4.html">
          <span class="level-number">4</span>
          <span class="level-map-size">20 x 20 Map</span>
        </a>

        <a class="level-card level-card-5 featured-level" href="level-5.html">
          <span class="level-number">5</span>
          <span class="level-map-size">8 x 8 Wall</span>
        </a>

        <a class="level-card level-card-6" href="level-6.html">
          <span class="level-number">6</span>
          <span class="level-map-size">12 x 12 Wall</span>
        </a>

        <a class="level-card level-card-7" href="level-7.html">
          <span class="level-number">7</span>
          <span class="level-map-size">18 x 18 Maze</span>
        </a>

        <a class="level-card level-card-8" href="level-8.html">
          <span class="level-number">8</span>
          <span class="level-map-size">30 x 30 City</span>
        </a>

        <a class="level-card level-card-9 featured-level" href="level-9.html">
          <span class="level-number">9</span>
          <span class="level-map-size">50 x 50 Map</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
