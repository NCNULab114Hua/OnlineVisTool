<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags for IEEE Xplore immersive article -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="An interactive article on using genetic algorithms to solve the 8-Queens problem. Learn how the choice of representation and operators affects your genetic algorithm.">
  <meta charset="utf8">
  <title>Evo-Panel2.0
  </title>

  <!-- Stylesheet for IEEE Xplore immersive article -->
  <link rel="stylesheet" href="fonts/stylesheet.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- MathJax javascript library and implementation file/s -->
  <script type="text/javascript" async
    src="https://xploreqa.ieee.org/xploreAssets/MathJax-274/MathJax.js?config=default">
    </script>

  <!-- Example chessboard immersive app -->
  <script type="text/javascript"
    src="https://xploreqa.ieee.org/assets/vendor/jquery/jquery-3.5.1.min.js"></script>
  <script type="text/javascript"
    src="chessboard/jquery-ui-1.13.2.min.js"></script>
  <link rel="stylesheet" href="chessboard/jquery-ui.min.css">
  <link rel="stylesheet" href="chessboard/chessboard.css">
  <script type="text/javascript" src="chessboard/chessboard.js"></script>
  
  <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {
                inlineMath: [['$','$'], ['\\(','\\)']],
                displayMath: [['$$','$$'], ['\\[','\\]']]
            },
            "HTML-CSS": { linebreaks: { automatic: true } }
        });
    </script>

  <style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 30px;
        border-top: 2px solid black;
        border-bottom: 2px solid black;
    }
    th, td {
        padding: 8px;
        text-align: left;
    }
    .table-header {
        font-weight: bold;
        margin-bottom: 10px;
        text-align: center;
        font-size: 0.9em;
    }
    .italic {
        font-style: italic;
    }
    .center {
        text-align: center;
    }
    .grey {
        color: grey;
    }
    sup {
        font-size: 0.7em;
        vertical-align: super;
    }
    .mid-border {
        border-bottom: 1px solid black;
    }
    .top-border {
        border-top: 2px solid black;
    }
    .makecell {
        text-align: center;
        white-space: pre-wrap;
    }
    .equation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px 0;
    }
    .equation .formula {
        flex: 1;
    }
    .equation .number {
        margin-left: 10px;
    }
  </style>

</head>

<body>
  <!-- Article with large top spacing -->
  <article class="mt-lg">
    <header>
      <!-- Page container -->
      <div class="container">
        <!-- Page title -->
        <h1>
          Evo-Panel2.0
        </h1>
      </div>
    </header>

    <!-- Content container with large top spacing -->
    <div class="container mt-lg">
      <div class="framed">
        <div class="inside">
          <!-- 上方標題 -->
          <!-- 主內容區塊 -->
          <div class="interactive-panel-Binary-stock">
            <!-- Left Clickable Box -->
            <div id="DynVisBox-stock" class="DynVis-box-Binary-stock">
              <!-- 顯示粒子資訊 -->
              <div id="particle-info-overlay-stock" class="particle-info-overlay-stock"></div>
            </div>
            <!-- bit 資訊顯示 -->
            <div id="bit-tooltip-stock" class="bit-tooltip-stock"></div>

            <!-- Fitness 顯示區 -->
            <div id="fitness-container-stock"></div>
    
            <!-- Status Bar -->
            <div id="status-bar-Binary-stock" class="status-bar-Binary-stock" style="display: block;"></div>
          </div>

          <!-- 拖拉進度條&進度條顯示區 -->
          <div id="generation-progress-container-stock" class="generation-progress-container-stock">
            <div id="generation-progress-bar-stock" class="generation-progress-bar-stock"></div>
            <div id="generation-progress-text-stock" class="generation-progress-text-stock">1 / 60 (generation)</div>
          </div>

          <!-- 下方控制按鈕 -->
          <div class="control-panel-stock">
            <!-- 輸入檔案 -->
            <div class="file-upload-stock">
              <input type="file" id="file-input-Binary-stock" accept=".epin" />
              <label for="file-input-Binary-stock" class="file-upload-trigger-stock">
                <span class="file-upload-icon-stock">Upload</span>
                <span class="file-upload-copy-stock">Choose .epin File</span>
              </label>
              <span id="file-name-stock" class="file-name-stock">No file selected</span>
            </div>
            <!-- 播放暫停 -->
            <button id="play-pause-btn-Binary-stock">Play</button>
            <!-- 播放加速減速 -->
            <div class="speed-control-container-stock">
              <button id="speed-up-btn-Binary-stock">+</button>
              <span id="speed-display-Binary-stock">Speed: 16x</span>
              <button id="speed-down-btn-Binary-stock">-</button>
            </div>
          </div>
          <div class="button-panel-stock">
            <!-- 機率模式 -->
            <button id="toggle-status-bar-stock">General Model</button>
            <!-- 機率模式 -->
            <button id="toggle-view-particles-stock">View Particles</button>
            <label class="particle-sort-control-stock" for="particle-sort-stock">
              <span>Particle Order</span>
              <select id="particle-sort-stock" disabled>
                <option value="original">Original</option>
                <option value="fitness-asc">Fitness Low to High</option>
                <option value="fitness-desc">Fitness High to Low</option>
              </select>
            </label>
            <!-- 顯示資訊模式 -->
            <button id="toggle-particle-info-stock">Show Information</button>
          </div>

          <!-- Label -->
          <!-- Y 軸標籤 (Generation) -->
          <div id="y-axis-label-stock" class="axis-label">Gen.</div>
          <!-- X 軸標籤 (Bit) -->
          <div id="x-axis-label-stock" class="axis-label">Bit</div>
          <!-- Fitness 軸標籤 -->
          <div id="fitness-axis-label-stock" class="axis-label">Fitness</div>
          <!-- Fitness 標籤上方的顏色說明 -->
          <div id="fitness-color-legend-stock" class="axis-label">■:0  □:1</div>
        </div>

        <script src="./panel/Binary_model_stock.js"></script>
      </div>
    </div>

  </article><!-- End of aticle -->

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var scrollTopBtn = document.querySelector(".scroll-top");
      window.onscroll = function () { scrollFunction(scrollTopBtn) };

      function scrollFunction(el) {
        if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
          el.style.display = "flex";
        } else {
          el.style.display = "none";
        }
      }
    });
  </script>
</body>

</html>
